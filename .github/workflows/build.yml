# Kindle-Dash 自动构建工作流
# ============================
# 每日 UTC 22:00（北京时间 06:00）自动运行构建脚本
# 聚合最新数据并更新静态页面

name: Build Kindle-Dash

on:
  # 定时触发：每日 UTC 22:00
  schedule:
    - cron: "0 22 * * *"

  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kindle-dash-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "src/requirements.txt"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      # 4. 运行构建脚本
      - name: Run builder.py
        run: python src/builder.py

      # 5. 提交生成的文件到根目录
      - name: Commit and push generated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase --autostash origin main
          git add index.html dashboard.html kindle.html
          git diff --staged --quiet || git commit -m "Auto-build: Update website $(date +'%Y-%m-%d %H:%M')"
          git push
